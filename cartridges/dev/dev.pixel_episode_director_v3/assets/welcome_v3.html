<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>像素短剧协作工厂 v3.0</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #15171b;
      --panel: #20232a;
      --line: #3a312b;
      --text: #f4f0e8;
      --muted: #b9afa3;
      --accent: #d2683a;
      --ok: #64b686;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 38px 30px 42px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      color: var(--ok);
      font-size: 13px;
      font-weight: 700;
    }
    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 28px;
    }
    .lane {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 14px;
      min-height: 118px;
    }
    .lane strong {
      display: block;
      margin-bottom: 8px;
      color: #fff8ed;
      font-size: 14px;
    }
    .lane span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }
    .accent {
      margin-top: 28px;
      padding-left: 14px;
      border-left: 3px solid var(--accent);
      color: #dbcfc2;
    }
    @media (max-width: 640px) {
      main { padding: 28px 20px 34px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="status">CF-FARP@0.4 协作流程</div>
    <h1>像素短剧协作工厂 v3.0</h1>
    <p>这个流程先让用户和 AI 对齐故事、素材、运镜三条高自由度方案，再把通过后的结构化结果交给素材工坊、镜头表和 Godot 渲染节点。</p>

    <section class="grid" aria-label="协作线">
      <div class="lane">
        <strong>故事节拍</strong>
        <span>AI 提案，用户确认或反馈；通过后输出 story_beats.v1。</span>
      </div>
      <div class="lane">
        <strong>素材建设</strong>
        <span>先复核 asset_spec_batch.v1，再生成草稿素材，避免工具副作用提前发生。</span>
      </div>
      <div class="lane">
        <strong>运镜方案</strong>
        <span>并行确定镜头运动和构图，后续镜头表会实际消费 camera_plan.v1。</span>
      </div>
    </section>

    <p class="accent">用户不通过时，协作节点会在同一节点吸收反馈重新输出方案；只有 resolved 的 payload 会继续流入后续工具。</p>
  </main>
</body>
</html>
