<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D 连续短剧工厂</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ec;
      --paper: #fffaf4;
      --line: #dfd2c4;
      --text: #332b24;
      --muted: #76695e;
      --accent: #c46f35;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 24px;
      display: grid;
      gap: 18px;
    }
    header {
      border-left: 4px solid var(--accent);
      padding-left: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      padding: 18px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.8;
    }
    code {
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f3eadf;
      color: #8f4b2d;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>3D 连续短剧工厂</h1>
      <p>LLM 负责编剧、分镜和调度；现成资产库、动作库和 Blender 编排脚本负责确定性执行。</p>
    </header>
    <section>
      <h2>第一阶段边界</h2>
      <ol>
        <li>不生成新角色、不生成新场景、不训练动作模型。</li>
        <li>AI 输出 <code>episode_script.v1</code> 和 <code>shot_list.v1</code>。</li>
        <li>工具把分镜映射到固定角色、场景、道具、动作标签和镜头模板。</li>
        <li>产出可播放 HTML 预演和 Blender Python 编排脚本。</li>
      </ol>
    </section>
    <section>
      <h2>目标</h2>
      <p>先打通 10-20 秒竖屏短剧预演链路。迁移到 3080 机器后，再让 Blender 或 ComfyUI 节点接管真实渲染和动作升级。</p>
    </section>
  </main>
</body>
</html>
