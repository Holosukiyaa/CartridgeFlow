<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>分镜导演台</title>
  <style>
    :root { color-scheme:dark; font-family:Inter,"Microsoft YaHei",sans-serif; letter-spacing:0; --bg:#101314; --panel:#191d1e; --line:#343b3c; --text:#eef2ef; --muted:#98a29f; --red:#ed6153; --green:#58b487; --amber:#d6a347; }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; background:var(--bg); color:var(--text); }
    button,input,select,textarea { font:inherit; }
    button,select { border:1px solid var(--line); background:#242a2b; color:var(--text); min-height:36px; }
    button { cursor:pointer; }
    button:hover { border-color:#6f7a79; }
    button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible { outline:2px solid var(--amber); outline-offset:2px; }
    .shell { display:grid; grid-template-rows:54px minmax(0,1fr) 126px; height:100vh; min-height:680px; }
    header { display:flex; align-items:center; gap:12px; padding:0 16px; border-bottom:1px solid var(--line); background:#15191a; }
    h1 { margin:0; font-size:16px; font-weight:650; }
    #counter { color:var(--muted); font-size:12px; }
    .status { margin-left:auto; color:var(--muted); font-size:12px; }
    #submit { padding:0 16px; background:#276e53; border-color:#469876; font-weight:650; }
    .main { display:grid; grid-template-columns:minmax(420px,1fr) 340px; min-height:0; }
    .stage { position:relative; min-width:0; overflow:hidden; background:#0d0f10; }
    canvas { width:100%; height:100%; display:block; touch-action:none; }
    .view-switch { position:absolute; z-index:4; top:12px; left:12px; display:grid; grid-template-columns:1fr 1fr; padding:3px; background:rgba(17,21,22,.9); border:1px solid var(--line); }
    .view-switch button { min-height:32px; padding:0 12px; border:0; background:transparent; color:var(--muted); white-space:nowrap; }
    .view-switch button.active { background:#e8ece9; color:#151918; }
    .viewport-badge { position:absolute; left:14px; bottom:12px; padding:5px 8px; background:rgba(17,21,22,.82); color:#d5dbd8; font-size:11px; pointer-events:none; }
    .safe { display:none; position:absolute; inset:6% 27%; border:1px solid rgba(255,255,255,.55); box-shadow:0 0 0 9999px rgba(0,0,0,.12); pointer-events:none; }
    .safe.visible { display:block; }
    .safe::before,.safe::after { content:""; position:absolute; background:rgba(255,255,255,.25); }
    .safe::before { left:0; right:0; top:33.333%; height:1px; box-shadow:0 calc(100% + 33.333% * 2) 0 rgba(255,255,255,.25); }
    .safe::after { top:0; bottom:0; left:33.333%; width:1px; box-shadow:calc(100% + 33.333% * 2) 0 0 rgba(255,255,255,.25); }
    aside { border-left:1px solid var(--line); background:var(--panel); padding:14px; overflow:auto; }
    .group { padding:0 0 14px; margin:0 0 14px; border-bottom:1px solid var(--line); }
    .group:last-child { border-bottom:0; }
    .group h2 { margin:0 0 10px; font-size:12px; color:#cbd2cf; text-transform:uppercase; }
    .scene-name { margin:0 0 6px; font-size:14px; font-weight:650; }
    .scene-note { margin:0; color:var(--muted); font-size:12px; line-height:1.55; }
    label { display:grid; grid-template-columns:76px 1fr 46px; gap:8px; align-items:center; margin:8px 0; color:var(--muted); font-size:12px; }
    label.select-row { grid-template-columns:76px 1fr; }
    input[type=range] { width:100%; accent-color:var(--red); }
    textarea { width:100%; min-height:80px; resize:vertical; border:1px solid var(--line); background:#111516; color:var(--text); padding:9px; }
    .motion-toolbar { display:grid; grid-template-columns:42px 1fr; gap:8px; margin-top:10px; }
    .motion-toolbar button { width:42px; padding:0; font-size:15px; }
    .motion-toolbar label { grid-template-columns:42px 1fr; gap:8px; margin:0; }
    .motion-toolbar select { width:100%; padding:0 8px; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .approve { background:#174c39; border-color:#2b7a5c; }
    .approve[aria-pressed=true] { background:var(--green); color:#07140e; font-weight:700; }
    .strip { display:flex; gap:8px; padding:10px 14px; border-top:1px solid var(--line); overflow-x:auto; background:#15191a; }
    .shot { flex:0 0 184px; height:104px; text-align:left; padding:7px; display:grid; grid-template-columns:58px 1fr; gap:8px; border-radius:4px; overflow:hidden; }
    .shot.active { border-color:var(--red); box-shadow:inset 0 0 0 1px var(--red); }
    .shot.approved { border-bottom:3px solid var(--green); }
    .shot img,.thumb-fallback { width:58px; height:86px; object-fit:cover; background:#313839; }
    .thumb-fallback { position:relative; overflow:hidden; }
    .thumb-fallback span { position:absolute; left:22px; bottom:10px; width:14px; height:34px; background:#344e65; }
    .shot-copy { min-width:0; display:flex; flex-direction:column; gap:5px; }
    .shot strong { font-size:12px; line-height:1.35; overflow:hidden; }
    .shot small { color:var(--muted); font-size:10px; line-height:1.35; overflow:hidden; }
    .deliverables { display:none; gap:8px; margin-left:8px; }
    .deliverables.visible { display:flex; }
    .deliverables a { display:inline-flex; align-items:center; min-height:32px; padding:0 10px; color:#d9dfdc; border:1px solid var(--line); text-decoration:none; font-size:11px; }
    .result-mode #submit,.result-mode .actions { display:none; }
    .result-mode aside input,.result-mode aside select,.result-mode aside textarea { pointer-events:none; opacity:.78; }
    .result-mode .motion-toolbar button,.result-mode .motion-toolbar select { pointer-events:auto; opacity:1; }
    @media (max-width:780px) {
      .shell { height:auto; min-height:100vh; grid-template-rows:54px auto 118px; padding-bottom:54px; }
      header { padding:0 8px; gap:6px; }
      header h1 { font-size:14px; }
      header .status,.deliverables { display:none !important; }
      #submit { position:fixed; z-index:20; right:8px; bottom:8px; padding:0 12px; }
      .main { grid-template-columns:1fr; }
      .stage { min-height:58vh; }
      aside { border-left:0; border-top:1px solid var(--line); }
      .view-switch { left:8px; top:8px; }
      .shot { flex-basis:168px; }
    }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <header>
      <h1 id="title">分镜导演台</h1><span id="counter"></span><div class="deliverables" id="deliverables"></div>
      <span class="status" id="status">等待分镜</span><button id="submit" title="提交全部已确认分镜">提交并继续</button>
    </header>
    <div class="main">
      <section class="stage" id="stageWrap">
        <canvas id="stage"></canvas>
        <div class="view-switch" role="group" aria-label="视角">
          <button id="freeView" class="active" type="button" title="全局自由视角">自由视角</button>
          <button id="shotView" type="button" title="实际分镜摄影机视角">分镜视角</button>
        </div>
        <div class="safe" id="safe"></div><div class="viewport-badge" id="viewportBadge">全局观察</div>
      </section>
      <aside id="inspector">
        <div class="group"><h2>场景规划</h2><p class="scene-name" id="sceneName">-</p><p class="scene-note" id="sceneNote">-</p></div>
        <div class="group"><h2>摄影机</h2>
          <label>X <input id="cameraX" type="range" min="-12" max="12" step="0.1"><output id="cameraXOut"></output></label>
          <label>Y <input id="cameraY" type="range" min="-14" max="12" step="0.1"><output id="cameraYOut"></output></label>
          <label>高度 <input id="cameraZ" type="range" min="0.2" max="10" step="0.1"><output id="cameraZOut"></output></label>
          <label>焦距 <input id="focal" type="range" min="18" max="120" step="1"><output id="focalOut"></output></label>
        </div>
        <div class="group"><h2>人物调度</h2>
          <label class="select-row">默认动作 <select id="action"></select></label>
          <label>X <input id="actorX" type="range" min="-8" max="8" step="0.1"><output id="actorXOut"></output></label>
          <label>Y <input id="actorY" type="range" min="-6" max="12" step="0.1"><output id="actorYOut"></output></label>
          <label>朝向 <input id="actorRotation" type="range" min="-180" max="180" step="1"><output id="actorRotationOut"></output></label>
          <label>动作点 <input id="pose" type="range" min="0" max="1" step="0.01"><output id="poseOut"></output></label>
          <div class="motion-toolbar"><button id="motionToggle" type="button" title="暂停动作" aria-label="暂停动作">Ⅱ</button><label>速度 <select id="motionSpeed" aria-label="动作播放速度"><option value="0.25">0.25x</option><option value="0.5">0.5x</option><option value="1" selected>1x</option><option value="1.5">1.5x</option></select></label></div>
          <label class="select-row">表情 <select id="expression"><option value="auto">动作自动</option><option value="neutral">平静</option><option value="happy">高兴</option><option value="relaxed">放松</option><option value="surprised">惊讶</option><option value="angry">生气</option><option value="sad">悲伤</option></select></label>
          <label>表情强度 <input id="expressionWeight" type="range" min="0" max="1" step="0.05"><output id="expressionWeightOut"></output></label>
          <label>视线水平 <input id="gazeYaw" type="range" min="-20" max="20" step="1"><output id="gazeYawOut"></output></label>
          <label>视线垂直 <input id="gazePitch" type="range" min="-15" max="15" step="1"><output id="gazePitchOut"></output></label>
          <label>头部俯仰 <input id="headPitch" type="range" min="-25" max="25" step="1"><output id="headPitchOut"></output></label>
          <label>头部水平 <input id="headYaw" type="range" min="-35" max="35" step="1"><output id="headYawOut"></output></label>
          <label>左臂抬高 <input id="leftArmRaise" type="range" min="-35" max="35" step="1"><output id="leftArmRaiseOut"></output></label>
          <label>右臂抬高 <input id="rightArmRaise" type="range" min="-35" max="35" step="1"><output id="rightArmRaiseOut"></output></label>
        </div>
        <div class="group"><h2>画面意图</h2><textarea id="prompt" aria-label="画面意图"></textarea></div>
        <div class="actions"><button id="reset" type="button">重置本镜</button><button class="approve" id="approve" type="button" aria-pressed="false">确认本镜</button></div>
      </aside>
    </div>
    <nav class="strip" id="strip" aria-label="分镜列表"></nav>
  </div>
  <script type="module">
    import * as THREE from './assets/vendor/three.module.min.js'
    import { OrbitControls } from './assets/vendor/OrbitControls.js'
    import { GLTFLoader } from './assets/vendor/GLTFLoader.js'
    import { clone as cloneSkeleton } from './assets/vendor/SkeletonUtils.js'

    const state={project:null,active:0,changes:new Map(),mode:'free',result:false,artifacts:[],syncing:false,motionPlaying:true,motionSpeed:1,performanceTime:0}
    const $=id=>document.getElementById(id)
    const canvas=$('stage')
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance',preserveDrawingBuffer:true})
    renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.shadowMap.enabled=true; renderer.outputColorSpace=THREE.SRGBColorSpace
    const scene=new THREE.Scene()
    const freeCamera=new THREE.PerspectiveCamera(48,1,.05,300); freeCamera.up.set(0,0,1); freeCamera.position.set(8,-11,7)
    const shotCamera=new THREE.PerspectiveCamera(48,1,.05,300); shotCamera.up.set(0,0,1)
    let controls=null,actorRigs=[],cameraHelper=null
    const actorAsset={template:null,bones:null,sourceHeight:1,restPose:new Map(),motionTemplate:null,motionClips:new Map(),motionRetargetEnabled:true,loading:false,error:'',motionError:''}
    const controlsIds=['cameraX','cameraY','cameraZ','focal','actorX','actorY','actorRotation','pose','expressionWeight','gazeYaw','gazePitch','headPitch','headYaw','leftArmRaise','rightArmRaise']
    const actionNames={idle_hold:'静止观察',walk_slow:'向前缓慢走',idle_talk:'站立交谈',gesture_interact:'手势互动',look_back:'回头观察',run_short:'向前短跑',sit_idle:'坐姿停留',sit_reading:'坐姿阅读',page_turn:'翻页',look_up:'抬头观察',point_forward:'指向前方',pick_up:'弯腰拾取'}
    const motionClipAliases={walk_slow:'Walk_Loop',idle_hold:'Idle_Loop',idle_talk:'Idle_Talking_Loop',gesture_interact:'Interact',run_short:'Sprint_Loop',sit_idle:'Sitting_Idle_Loop',sit_reading:'Sitting_Idle_Loop',page_turn:'Interact',look_up:'Idle_Talking_Loop',point_forward:'Interact',pick_up:'PickUp_Table'}
    const approvedMotionActions=new Set(['walk_slow','idle_hold','idle_talk','gesture_interact','run_short','sit_idle'])
    const actionAliases={
      sitting_reading:{action:'sit_reading'},
      idle_read:{action:'sit_reading'},
      reading_focused:{action:'sit_reading'},
      hand_still:{action:'sit_reading'},
      reading_then_looking_up:{action:'sit_reading',head_pitch_degrees:-18},
      turning_page:{action:'page_turn'},
      looking_up_smiling:{action:'sit_reading',head_pitch_degrees:-18,expression:'happy',expression_weight:.7},
      tracking_butterfly_closing_book:{action:'sit_reading',head_pitch_degrees:-12,expression:'happy',expression_weight:.45},
      closing_book:{action:'page_turn'},
      watching_butterfly:{action:'sit_reading',head_pitch_degrees:-12,expression:'relaxed',expression_weight:.3},
      surprised_then_smile:{action:'sit_reading',expression:'happy',expression_weight:.7},
      close_book_look_up:{action:'page_turn',head_pitch_degrees:-18,expression:'happy',expression_weight:.45},
      gaze_at_distance:{action:'sit_reading',head_pitch_degrees:-12,expression:'relaxed',expression_weight:.3},
      pack_up_walk_away:{action:'walk_slow'},
      reading:{action:'sit_reading'},
      read:{action:'sit_reading'},
      hand_tracing_text:{action:'page_turn'},
      turn_page:{action:'page_turn'},
      look_up_thoughtfully:{action:'look_up'},
      return_to_reading_with_smile:{action:'sit_reading',expression:'happy',expression_weight:.55},
      walk_forward:{action:'walk_slow'},
      walk_backward:{action:'walk_slow'},
      talking:{action:'idle_talk'},
      interact:{action:'gesture_interact'}
    }
    const humanoidAliases={hips:['hips'],spine:['spine'],chest:['chest'],upperChest:['upperChest'],neck:['neck'],head:['head'],leftEye:['leftEye'],rightEye:['rightEye'],leftShoulder:['leftShoulder'],rightShoulder:['rightShoulder'],leftUpperArm:['leftUpperArm'],leftLowerArm:['leftLowerArm'],leftHand:['leftHand'],rightUpperArm:['rightUpperArm'],rightLowerArm:['rightLowerArm'],rightHand:['rightHand'],leftUpperLeg:['leftUpperLeg'],leftLowerLeg:['leftLowerLeg'],leftFoot:['leftFoot'],leftToes:['leftToes'],rightUpperLeg:['rightUpperLeg'],rightLowerLeg:['rightLowerLeg'],rightFoot:['rightFoot'],rightToes:['rightToes']}
    for(const side of ['left','right'])for(const finger of ['Thumb','Index','Middle','Ring','Little'])for(const segment of ['Proximal','Intermediate','Distal'])humanoidAliases[side+finger+segment]=[side+finger+segment]
    const motionBoneNames={hips:'pelvis',spine:'spine_01',chest:'spine_02',upperChest:'spine_03',neck:'neck_01',head:'Head',leftShoulder:'clavicle_l',leftUpperArm:'upperarm_l',leftLowerArm:'lowerarm_l',leftHand:'hand_l',rightShoulder:'clavicle_r',rightUpperArm:'upperarm_r',rightLowerArm:'lowerarm_r',rightHand:'hand_r',leftUpperLeg:'thigh_l',leftLowerLeg:'calf_l',leftFoot:'foot_l',leftToes:'ball_l',rightUpperLeg:'thigh_r',rightLowerLeg:'calf_r',rightFoot:'foot_r',rightToes:'ball_r'}
    for(const [side,sourceSide] of [['left','l'],['right','r']])for(const [finger,sourceFinger] of [['Thumb','thumb'],['Index','index'],['Middle','middle'],['Ring','ring'],['Little','pinky']])for(const [segment,sourceSegment] of [['Proximal','01'],['Intermediate','02'],['Distal','03']])motionBoneNames[side+finger+segment]=`${sourceFinger}_${sourceSegment}_${sourceSide}`
    const current=()=>state.project?.shots?.[state.active]||null
    const vec=(value,fallback)=>Array.isArray(value)&&value.length>=3?value.map(Number):[...fallback]
    const color=(value,fallback)=>{try{return new THREE.Color(value||fallback)}catch{return new THREE.Color(fallback)}}
    function normalizeActionId(value){const raw=String(value||'idle_hold').trim().toLowerCase().replace(/[- ]/g,'_');return actionAliases[raw]?.action||raw||'idle_hold'}
    function normalizeProjectActions(project){for(const shot of project.shots||[]){for(const actor of shot.actors||[]){const raw=String(actor.action||'idle_hold').trim().toLowerCase().replace(/[- ]/g,'_'),hint=actionAliases[raw];actor.action=hint?.action||raw||'idle_hold';if(hint){for(const key of ['head_pitch_degrees','expression','expression_weight'])if(actor[key]===undefined&&hint[key]!==undefined)actor[key]=hint[key]}const available=Array.isArray(actor.available_actions)?actor.available_actions.map(normalizeActionId):Object.keys(actionNames);actor.available_actions=[...new Set([...available,actor.action])]}}return project}
    function clearScene(){while(scene.children.length)scene.remove(scene.children[0]);actorRigs=[];cameraHelper=null}
    function material(value,rough=.85){return new THREE.MeshStandardMaterial({color:value,roughness:rough,metalness:.05})}
    function box(size,position,value){const mesh=new THREE.Mesh(new THREE.BoxGeometry(...size),material(value));mesh.position.set(...position);mesh.castShadow=true;mesh.receiveShadow=true;return mesh}
    function addEnvironment(item){
      const kind=String(item.kind||'prop'),p=vec(item.position,[0,2,.5]),s=vec(item.scale,[1,1,1]),c=item.color||'#777f82'
      if(kind==='tree'){
        const group=new THREE.Group();group.position.set(...p);group.add(box([.28*s[0],.28*s[1],2.1*s[2]],[0,0,1.05*s[2]],'#67513f'))
        const crown=new THREE.Mesh(new THREE.IcosahedronGeometry(.9*s[0],1),material(c));crown.position.z=2.35*s[2];crown.castShadow=true;group.add(crown);scene.add(group);return
      }
      if(kind==='lamp'){
        const group=new THREE.Group();group.position.set(...p);group.add(box([.12,.12,2.8],[0,0,1.4],'#42494a'))
        const glow=new THREE.Mesh(new THREE.SphereGeometry(.24,16,10),new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:.6}));glow.position.z=2.75;group.add(glow);scene.add(group);return
      }
      const dimensions=kind==='wall'?[s[0],s[1],s[2]]:kind==='window'||kind==='board'?[s[0],Math.max(.12,s[1]),s[2]]:s
      scene.add(box(dimensions,p,c))
    }
    function createLimb(radius,length,value){const geometry=new THREE.CapsuleGeometry(radius,length,6,10);geometry.rotateX(Math.PI/2);const mesh=new THREE.Mesh(geometry,material(value));mesh.castShadow=true;return mesh}
    function createBookProp(){const group=new THREE.Group(),cover=box([.48,.34,.035],[0,0,0],'#7c2f32'),pages=box([.43,.3,.04],[0,0,.03],'#e8e1d2');group.add(cover,pages);group.visible=false;return group}
    function buildActorProxy(actor,index){
      const wardrobe=['#35536b','#7b4e5b','#4d6650'],rig=new THREE.Group();rig.name=actor.id||`actor_${index+1}`;const bodyColor=wardrobe[index%wardrobe.length],body=box([.68,.38,1.05],[0,0,1.42],bodyColor);rig.add(body)
      const head=new THREE.Mesh(new THREE.SphereGeometry(.28,20,14),material('#d9ab83'));head.position.z=2.22;head.castShadow=true;rig.add(head)
      const parts={leftArm:createLimb(.105,.72,bodyColor),rightArm:createLimb(.105,.72,bodyColor),leftLeg:createLimb(.13,.82,'#252a31'),rightLeg:createLimb(.13,.82,'#252a31')}
      parts.leftArm.position.set(-.48,0,1.48);parts.rightArm.position.set(.48,0,1.48);parts.leftLeg.position.set(-.2,0,.55);parts.rightLeg.position.set(.2,0,.55)
      Object.values(parts).forEach(part=>rig.add(part));rig.userData.parts=parts;scene.add(rig);actorRigs[index]=rig;updateActor(actor,index)
    }
    function resolveHumanoidBones(model,source){
      const map=Object.create(null),json=source?.parser?.json||{},extension=json.extensions?.VRMC_vrm||json.extensions?.VRM||{},raw=extension.humanoid?.humanBones||extension.humanoid?.human_bones||[]
      const items=Array.isArray(raw)?raw:Object.entries(raw).map(([bone,value])=>({bone,...(value||{})}))
      for(const item of items){const name=String(item.bone||item.name||'');const node=json.nodes?.[item.node];const object=node?.name?model.getObjectByName(node.name):null;if(name&&object)map[name]=object}
      model.traverse(object=>{const n=String(object.name||'');for(const key of Object.keys(humanoidAliases)){if(!map[key]&&humanoidAliases[key].some(alias=>n===alias||n.toLowerCase()===alias.toLowerCase()))map[key]=object}})
      return map
    }
    function resolveExpressionBindings(model,source){
      const json=source?.parser?.json||{},vrm=json.extensions?.VRMC_vrm||{},groups=vrm.expressions||{},expressions=new Map(),controlled=new Map()
      for(const entries of [groups.preset||{},groups.custom||{}])for(const [name,spec] of Object.entries(entries)){
        const binds=[]
        for(const bind of spec?.morphTargetBinds||[]){const node=json.nodes?.[bind.node],mesh=node?.name?model.getObjectByName(node.name):null,index=Number(bind.index);if(!mesh?.morphTargetInfluences||!Number.isInteger(index)||index<0||index>=mesh.morphTargetInfluences.length)continue;binds.push({mesh,index,weight:Number(bind.weight??1)});controlled.set(`${mesh.uuid}:${index}`,{mesh,index})}
        if(binds.length)expressions.set(name,binds)
      }
      return {expressions,controlled:[...controlled.values()]}
    }
    function setExpressionWeight(rig,name,value){for(const bind of rig.userData.expressions?.get(name)||[])bind.mesh.morphTargetInfluences[bind.index]+=THREE.MathUtils.clamp(value,0,1)*bind.weight}
    function applyPerformanceOverlay(rig,time){
      const actor=rig.userData.actor;if(!actor)return
      for(const bind of rig.userData.controlledExpressions||[])bind.mesh.morphTargetInfluences[bind.index]=0
      const action=String(actor.action||'idle_hold'),talk=action==='idle_talk'||action==='gesture_interact',reading=action==='sit_reading'||action==='page_turn',expression=String(actor.expression||'auto'),expressionWeight=THREE.MathUtils.clamp(Number(actor.expression_weight??.65),0,1)
      const blinkPhase=(time+(rig.userData.actorIndex||0)*.53)%4.1,blink=blinkPhase<.16?Math.sin(Math.PI*blinkPhase/.16):0
      setExpressionWeight(rig,'blink',blink)

    $('motionToggle').onclick=()=>setMotionPlaying(!state.motionPlaying);$('motionSpeed').onchange=()=>{state.motionSpeed=Number($('motionSpeed').value)||1;syncMotionControls()};syncMotionControls()
    $('freeView').onclick=()=>{state.mode='free';bindControls()};$('shotView').onclick=()=>{state.mode='shot';syncShotCamera(current());bindControls()}
    $('approve').onclick=()=>{if(state.result)return;const shot=current();shot.review.status=shot.review.status==='approved'?'draft':'approved';state.changes.set(shot.id,structuredClone(shot));syncInspector();renderStrip();if(shot.review.status==='approved'&&state.active<state.project.shots.length-1)selectShot(state.active+1)}
    $('reset').onclick=()=>{if(state.result)return;const shot=current(),initial=structuredClone(shot._initial);initial._initial=shot._initial;state.project.shots[state.active]=initial;state.changes.delete(shot.id);selectShot(state.active)}
    $('submit').onclick=()=>{if(!state.project)return;const approved=state.project.shots.filter(shot=>shot.review.status==='approved').map(shot=>shot.id);if(approved.length!==state.project.shots.length){$('status').textContent=`还有 ${state.project.shots.length-approved.length} 镜未确认`;return}const shot_changes=state.project.shots.map(shot=>({shot_id:shot.id,camera:shot.camera,actors:shot.actors,props:shot.props,lighting:shot.lighting,prompt:shot.prompt,duration_seconds:shot.duration_seconds}));parent.postMessage({schema:'cartridgeflow.dlc_ui_message.v1',type:'submit_interaction',values:{approval:'approve_all',approved_shot_ids:approved,shot_changes}},'*');$('status').textContent='已提交'}
    addEventListener('message',event=>{const data=event.data||{};if(data.schema!=='cartridgeflow.dlc_ui_host.v1'||!data.project)return;if(data.type==='load_storyboard')load(data.project,{artifacts:data.artifacts||[]});if(data.type==='load_result')load(data.project,{result:true,artifacts:data.artifacts||[]})})
    addEventListener('resize',resize);new ResizeObserver(resize).observe($('stageWrap'));parent.postMessage({schema:'cartridgeflow.dlc_ui_message.v1',type:'ready'},'*');resize();animate();loadActorAsset()
  </script>
</body>
</html>
