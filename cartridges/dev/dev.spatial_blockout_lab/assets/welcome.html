<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D 草图实验室</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e9;
      --paper: #fffaf4;
      --line: #dfd2c4;
      --text: #332b24;
      --muted: #76695e;
      --accent: #c46f35;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 24px;
      display: grid;
      gap: 18px;
    }
    header {
      border-left: 4px solid var(--accent);
      padding-left: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      padding: 18px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.8;
    }
    code {
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f3eadf;
      color: #8f4b2d;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>3D 草图实验室</h1>
      <p>把一句空间想法转成可预览的低模 3D 草图，用于验证角色站位、场景体块、道具关系和镜头方向。</p>
    </header>
    <section>
      <h2>运行方式</h2>
      <ol>
        <li>输入一个 3D 场景想法，例如“蓝色夹克少年站在废弃地铁站入口”。</li>
        <li>AI 先生成 <code>scene_blockout.v1</code> 规格，并等待你确认。</li>
        <li>本地工具生成 <code>GLB</code>、场景 JSON、manifest 和 HTML 预览。</li>
        <li>你查看产物后确认；不满意就回到规格节点局部重做。</li>
      </ol>
    </section>
    <section>
      <h2>当前边界</h2>
      <p>这是 3D 草图，不是最终美术。第一版不依赖 Blender 或外部 AI 3D 服务，优先验证流程、结构化规格和可交付产物链路。</p>
    </section>
  </main>
</body>
</html>
